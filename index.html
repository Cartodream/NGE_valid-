<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte V1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="sidebar">
        <h2>Filtres</h2>
        
        <div class="filter-section">
            
            <div class="logo-filter" id="logoAgences" data-active="true">
                <img src="images/logo_NGE_cmjn.svg" alt="Agences" class="filter-logo">
                <span class="filter-label">Implantations</span>
            </div>
            <div class="logo-filter" id="logoWater" data-active="true">
                <img src="images/logo_cycle.svg" alt="Cycle de l'eau" class="filter-logo">
                <span class="filter-label">Cycle de l'eau</span>
            </div>
            <div class="logo-filter" id="logoRevema" data-active="true">
                <img src="images/logo_revema.svg" alt="Revema" class="filter-logo">
                <span class="filter-label">Revema</span>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
